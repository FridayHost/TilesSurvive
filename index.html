<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мое Mini App</title>
    <!-- Подключаем скрипт Telegram Web App -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            /* Используем переменные цветов Telegram для адаптации под тему пользователя */
            background-color: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        button {
            background-color: var(--tg-theme-button-color);
            color: var(--tg-theme-button-text-color);
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1 id="greeting">Привет!</h1>
    <p>Сережа, надо что-то делать</p>
    <button id="btn">Расформировать штат</button>

    <script>
        // Инициализируем объект Telegram WebApp
        let tg = window.Telegram.WebApp;

        // Разворачиваем приложение на весь экран
        tg.expand();

        // Получаем имя пользователя (если доступно)
        let user = tg.initDataUnsafe.user;
        if (user) {
            document.getElementById('greeting').innerText = `Привет, ${user.first_name}!`;
        }

        // Обработка нажатия кнопки
        document.getElementById('btn').addEventListener('click', function() {
            // Отправляем данные боту
            tg.sendData("Привет, бот! Пользователь нажал кнопку.");
            
            // Закрываем приложение
            tg.close();
        });
    </script>
</body>
</html>
