<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registration</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <!-- Переключатель языка -->
    <div class="language-toggle">
      <button id="lang-ru" class="lang-btn active">RU</button>
      <button id="lang-en" class="lang-btn">EN</button>
    </div>

    <h1 data-i18n="register_title">Регистрация</h1>
    
    <form id="register-form">
      <label data-i18n="label_nickname">Никнейм</label>
      <input type="text" id="nickname" required maxlength="20">

      <label data-i18n="label_union">Союз</label>
      <input type="text" id="union" required maxlength="30">

      <label data-i18n="label_state">Штат</label>
      <input type="text" id="state" required maxlength="30">

      <label data-i18n="label_level">Уровень электростанции (1-30)</label>
      <input type="number" id="level" min="1" max="30" required>

      <button type="submit" class="main-btn" data-i18n="btn_register">Зарегистрироваться</button>
    </form>
    
    <p id="error-msg" class="error"></p>
  </div>

  <!-- Подключаем Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  
  <script src="config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
