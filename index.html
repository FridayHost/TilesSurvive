<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Registration</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <div class="language-toggle">
      <button class="lang-btn active" id="lang-ru">RU</button>
      <button class="lang-btn" id="lang-en">EN</button>
    </div>

    <h1 data-i18n="title">Регистрация</h1>

    <form id="register-form">
      <label data-i18n="label_nickname">Никнейм</label>
      <input type="text" id="nickname" placeholder="Your nickname" maxlength="20" required>

      <label data-i18n="label_union">Союз</label>
      <input type="text" id="union" placeholder="Your union" maxlength="30" required>

      <label data-i18n="label_state">Штат</label>
      <input type="text" id="state" placeholder="Your state" maxlength="30" required>

      <label data-i18n="label_level">Уровень электростанции (1-30)</label>
      <input type="number" id="level" placeholder="1-30" min="1" max="30" required>

      <button type="submit" class="main-btn" data-i18n="btn_register">Зарегистрироваться</button>
    </form>

    <p class="error visible" id="error-msg"></p>
  </div>

  <!-- 1. Сначала Firebase SDK (без пробелов в URL!) -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  
  <!-- 2. Потом Конфиг -->
  <script src="config.js"></script>
  
  <!-- 3. Потом API (создаёт функции saveUser, getUser, deleteUser) -->
  <script src="js/api.js"></script>
  
  <!-- 4. В конце Приложение -->
  <script src="js/app.js"></script>
</body>
</html>
