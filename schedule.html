<head>

  <title>Расписание</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .schedule-header {
      margin-bottom: 20px;
    }
    
    .day-selector {
      display: flex;
      gap: 4px;
      overflow-x: auto;
      padding: 8px 0;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    
    .day-selector::-webkit-scrollbar {
      display: none;
    }
    
    .day-btn {
      flex: 0 0 auto;
      padding: 10px 16px;
      background: var(--secondary-bg);
      color: var(--text-color);
      border: none;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s;
    }
    
    .day-btn.active {
      background: var(--button-color);
      color: var(--button-text);
    }
    
    .schedule-content {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    
    .time-block {
      background: var(--secondary-bg);
      border-radius: 12px;
      padding: 16px;
    }
    
    .time-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
      font-weight: 600;
      font-size: 14px;
      color: var(--button-color);
    }
    
    .event-item {
      margin-bottom: 12px;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(0,0,0,0.05);
    }
    
    .event-item:last-child {
      margin-bottom: 0;
      padding-bottom: 0;
      border-bottom: none;
    }
    
    .event-title {
      font-weight: 600;
      font-size: 15px;
      margin-bottom: 8px;
      color: var(--text-color);
    }
    
    .event-modes {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }
    
    .mode-tag {
      padding: 4px 10px;
      background: rgba(51, 144, 236, 0.1);
      color: var(--button-color);
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
    }
    
    .mode-tag.duel {
      background: rgba(223, 63, 64, 0.1);
      color: #df3f40;
    }
    
    .mode-tag.game {
      background: rgba(255, 193, 7, 0.1);
      color: #ffa000;
    }
    
    .mode-tag.turtle {
      background: rgba(76, 175, 80, 0.1);
      color: #43a047;
    }
    
    .intersection-note {
      margin-top: 8px;
      padding: 8px 12px;
      background: rgba(0,0,0,0.03);
      border-radius: 8px;
      font-size: 12px;
      color: var(--hint-color);
      font-style: italic;
    }
  </style>
</head>

    // Get mode class
    function getModeClass(mode) {
      const modeMap = {
        'duel': 'duel',
        'game': 'game',
        'turtle': 'turtle'
      };
      return modeMap[mode] || '';
    }

    // Get mode text
    function getModeText(mode) {
      const modeMap = {
        'duel': '⚔️ Дуэль союзов',
        'game': '🎰 Игра по-крупному',
        'turtle': '🐢 Турбочерепаха'
      };
      return modeMap[mode] || mode;
    }

    // Render schedule for selected day
    function renderSchedule(day) {
      const content = document.getElementById('schedule-content');
      const data = scheduleData[day];
      
      if (!data || !data.blocks) {
        content.innerHTML = '<div class="time-block">Нет данных</div>';
        return;
      }

      let html = '';
      
      data.blocks.forEach(block => {
        html += `
          <div class="time-block">
            <div class="time-header">
              <span>⏰</span>
              <span>${block.time || 'Весь день'}</span>
            </div>
        `;
        
        block.events.forEach((event, index) => {
          html += `
            <div class="event-item">
              <div class="event-title">${event.title}</div>
          `;
          
          if (event.modes && event.modes.length > 0) {
            html += '<div class="event-modes">';
            event.modes.forEach(mode => {
              html += `<span class="mode-tag ${getModeClass(mode)}">${getModeText(mode)}</span>`;
            });
            html += '</div>';
          }
          
          if (event.note) {
            html += `<div class="intersection-note">${event.note}</div>`;
          }
          
          html += '</div>';
        });
        
        html += '</div>';
      });
      
      content.innerHTML = html;
    }

    // Set active day button
    function setActiveDay(day) {
      document.querySelectorAll('.day-btn').forEach(btn => {
        btn.classList.remove('active');
        if (parseInt(btn.dataset.day) === day) {
          btn.classList.add('active');
        }
      });
      renderSchedule(day);
    }

    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
      // Get current day of week (0 = Sunday, 1 = Monday, etc.)
      const today = new Date().getDay();
      
      // Set active day
      setActiveDay(today);
      
      // Add click handlers
      document.querySelectorAll('.day-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const day = parseInt(btn.dataset.day);
          setActiveDay(day);
        });
      });
    });
