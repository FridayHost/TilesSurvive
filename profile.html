<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <div class="profile-header">
      <h2 id="profile-nickname">Loading...</h2>
      <p>Уровень станции:</p>
      <div class="level-badge" id="profile-level">--</div>
    </div>

    <nav class="main-menu">
      <a href="schedule.html" class="menu-btn">📅 Расписание</a>
      <a href="profile.html" class="menu-btn active">👤 Профиль</a>
      <a href="news.html" class="menu-btn">📰 Новости</a>
      <a href="lion-reminder.html" class="menu-btn">🦁 Лев</a>
      <a href="channels.html" class="menu-btn">📢 Каналы</a>
      <a href="support.html" class="menu-btn">❓ Поддержка</a>
    </nav>
    
    <button id="logout-btn" class="secondary-btn">Выйти</button>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <script src="config.js"></script>
  <script src="js/api.js"></script>
  <script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    window.addEventListener('load', async () => {
      const telegramId = tg.initDataUnsafe?.user?.id;
      const user = await getUser(telegramId);
      
      if (user) {
        document.getElementById('profile-nickname').textContent = user.nickname;
        document.getElementById('profile-level').textContent = user.level;
      } else {
        window.location.href = 'index.html';
      }
    });

    document.getElementById('logout-btn')?.addEventListener('click', () => {
      localStorage.removeItem('tma_user');
      window.location.href = 'index.html';
    });
  </script>
</body>
</html>
