<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  
  <style>
    :root {
      --bg-color: var(--tg-theme-bg-color, #fff);
      --text-color: var(--tg-theme-text-color, #000);
      --button-color: var(--tg-theme-button-color, #3390ec);
      --button-text: var(--tg-theme-button-text-color, #fff);
      --secondary-bg: var(--tg-theme-secondary-bg-color, #f0f0f0);
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      padding: 16px;
    }

    .container { max-width: 480px; margin: 0 auto; }

    .profile-header {
      text-align: center;
      padding: 20px 0;
      border-bottom: 1px solid var(--secondary-bg);
      margin-bottom: 24px;
    }

    .level-badge {
      display: inline-block;
      background: var(--button-color);
      color: var(--button-text);
      padding: 4px 16px;
      border-radius: 20px;
      font-weight: bold;
      margin-top: 8px;
    }

    .main-menu { display: flex; flex-direction: column; gap: 10px; }

    .menu-btn {
      display: block;
      padding: 14px 16px;
      background: var(--secondary-bg);
      color: var(--text-color);
      text-decoration: none;
      border-radius: 10px;
      font-weight: 500;
    }

    .menu-btn.active {
      background: var(--button-color);
      color: var(--button-text);
    }

    .secondary-btn {
      margin-top: 24px;
      width: 100%;
      padding: 12px;
      background: transparent;
      border: 1px solid var(--button-color);
      color: var(--button-color);
      border-radius: 8px;
      cursor: pointer;
    }

    .delete-btn {
      margin-top: 16px;
      width: 100%;
      padding: 12px;
      background: #e53935;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    .delete-btn:hover { background: #b71c1c; }

    .loading { text-align: center; padding: 50px; color: #666; }

    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.6);
      z-index: 1000;
    }

    .modal {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      background: var(--bg-color);
      padding: 24px;
      border-radius: 12px;
      max-width: 320px;
      width: 90%;
      text-align: center;
    }

    .modal h3 { margin-top: 0; color: #e53935; }
    .modal-buttons { display: flex; gap: 10px; margin-top: 20px; }
    .modal-btn { flex: 1; padding: 10px; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; }
    .modal-btn-cancel { background: var(--secondary-bg); color: var(--text-color); }
    .modal-btn-confirm { background: #e53935; color: #fff; }
  </style>
</head>
<body>
  <div class="container">
    <div id="loading" class="loading">Загрузка профиля...</div>
    
    <div id="profile-content" style="display: none;">
      <div class="profile-header">
        <h2 id="profile-nickname">Loading...</h2>
        <p>Уровень станции:</p>
        <div class="level-badge" id="profile-level">--</div>
      </div>

      <nav class="main-menu">
        <a href="schedule.html" class="menu-btn">📅 Расписание</a>
        <a href="profile.html" class="menu-btn active">👤 Профиль</a>
        <a href="news.html" class="menu-btn">📰 Новости</a>
        <a href="lion-reminder.html" class="menu-btn">🦁 Лев</a>
        <a href="channels.html" class="menu-btn">📢 Каналы</a>
        <a href="support.html" class="menu-btn">❓ Поддержка</a>
      </nav>
      
      <button id="logout-btn" class="secondary-btn">Выйти</button>
      <button id="delete-account-btn" class="delete-btn">🗑️ Удалить аккаунт</button>
    </div>
  </div>

  <div id="delete-modal" class="modal-overlay">
    <div class="modal">
      <h3>⚠️ Удаление аккаунта</h3>
      <p>Вы уверены? Все данные будут удалены безвозвратно.</p>
      <div class="modal-buttons">
        <button class="modal-btn modal-btn-cancel" id="cancel-delete">Отмена</button>
        <button class="modal-btn modal-btn-confirm" id="confirm-delete">Удалить</button>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <script src="config.js"></script>
  <script src="js/api.js"></script>
  
  <script>
    console.log('🔹 Profile script started');
    const tg = window.Telegram.WebApp;
    tg.expand();

    async function deleteUserLocal(telegramId) {
      try {
        if (typeof firebase === 'undefined' || !firebase.apps.length) return false;
        const db = firebase.firestore();
        await db.collection('users').doc(String(telegramId)).delete();
        return true;
      } catch (error) {
        console.error('❌ Delete error:', error);
        return false;
      }
    }

    window.addEventListener('load', async () => {
      const telegramId = tg.initDataUnsafe?.user?.id;
      if (!telegramId) {
        document.getElementById('loading').textContent = '❌ Ошибка: нет данных Telegram';
        return;
      }
      
      let user = null;
      if (typeof window.getUser === 'function') {
        user = await window.getUser(telegramId);
      } else {
        user = JSON.parse(localStorage.getItem('tma_user'));
      }
      
      if (user) {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('profile-content').style.display = 'block';
        document.getElementById('profile-nickname').textContent = user.nickname;
        document.getElementById('profile-level').textContent = user.level;
        setupButtons(telegramId);
      } else {
        window.location.href = 'index.html';
      }
    });

    function setupButtons(telegramId) {
      const logoutBtn = document.getElementById('logout-btn');
      if (logoutBtn) {
        logoutBtn.addEventListener('click', () => {
          localStorage.removeItem('tma_user');
          window.location.href = 'index.html';
        });
      }

      const deleteBtn = document.getElementById('delete-account-btn');
      const modal = document.getElementById('delete-modal');
      const cancelBtn = document.getElementById('cancel-delete');
      const confirmBtn = document.getElementById('confirm-delete');

      if (!deleteBtn || !modal || !confirmBtn) return;

      deleteBtn.addEventListener('click', () => { modal.style.display = 'block'; });
      cancelBtn.addEventListener('click', () => { modal.style.display = 'none'; });

      confirmBtn.addEventListener('click', async () => {
        const deleteFunc = window.deleteUser || deleteUserLocal;
        if (typeof deleteFunc !== 'function') {
          tg.showAlert('❌ Ошибка: функция удаления не найдена');
          return;
        }

        confirmBtn.textContent = 'Удаление...';
        confirmBtn.disabled = true;
        
        try {
          const success = await deleteFunc(telegramId);
          if (success) {
            localStorage.removeItem('tma_user');
            tg.showAlert('✅ Аккаунт удалён!');
            window.location.href = 'index.html';
          } else {
            tg.showAlert('❌ Ошибка при удалении');
            confirmBtn.textContent = 'Удалить';
            confirmBtn.disabled = false;
            modal.style.display = 'none';
          }
        } catch (err) {
          tg.showAlert('Ошибка: ' + err.message);
          confirmBtn.textContent = 'Удалить';
          confirmBtn.disabled = false;
          modal.style.display = 'none';
        }
      });
    }
  </script>
</body>
</html>
