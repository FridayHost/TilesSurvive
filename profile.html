<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile Test</title>
  <!-- ✅ Чистые URL без пробелов -->
  <script src="window.addEventListener('load', async () => {
  const telegramId = tg.initDataUnsafe?.user?.id;
  
  // 🔴 Если нет Telegram ID — показываем понятную ошибку
  if (!telegramId) {
    console.warn('⚠️ User ID not available - app opened outside Telegram?');
    document.getElementById('loading').innerHTML = `
      <div style="text-align:center;padding:20px;">
        <p>❌ Приложение должно открываться через Telegram</p>
        <p style="font-size:12px;color:#666;">
          Откройте бота → нажмите кнопку меню слева от поля ввода
        </p>
        <button onclick="window.location.href='index.html'" 
                style="padding:10px 20px;background:#3390ec;color:#fff;border:none;border-radius:8px;cursor:pointer;">
          Попробовать снова
        </button>
      </div>
    `;
    return;
  }
  
  // ... остальной код загрузки профиля
});"></script>
  
  <style>
    body { 
      margin: 0; 
      font-family: sans-serif; 
      background: var(--tg-theme-bg-color, #fff); 
      color: var(--tg-theme-text-color, #000); 
      padding: 16px; 
    }
    .container { max-width: 480px; margin: 0 auto; }
    .menu-btn {
      display: block;
      padding: 14px 16px;
      background: var(--tg-theme-secondary-bg-color, #f0f0f0);
      color: var(--tg-theme-text-color, #000);
      text-decoration: none;
      border-radius: 10px;
      margin: 8px 0;
      font-weight: 500;
    }
    .menu-btn.active {
      background: var(--tg-theme-button-color, #3390ec);
      color: var(--tg-theme-button-text-color, #fff);
    }
    .debug {
      margin-top: 20px;
      padding: 12px;
      background: #f5f5f5;
      border-radius: 8px;
      font-size: 12px;
      font-family: monospace;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>✅ Профиль загружен!</h2>
    
    <nav class="main-menu">
      <a href="schedule.html" class="menu-btn">📅 Расписание</a>
      <a href="profile.html" class="menu-btn active">👤 Профиль</a>
      <a href="news.html" class="menu-btn">📰 Новости</a>
      <a href="lion-reminder.html" class="menu-btn">🦁 Лев</a>
      <a href="channels.html" class="menu-btn">📢 Каналы</a>
      <a href="support.html" class="menu-btn">❓ Поддержка</a>
    </nav>
    
    <div id="debug" class="debug">Загрузка...</div>
  </div>

  <!-- ✅ Firebase SDK (чистые URL) -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  
  <script>
    const debug = document.getElementById('debug');
    const logs = [];
    
    function log(msg) {
      logs.push(msg);
      debug.textContent = logs.join('\n');
      console.log(msg);
    }
    
    log('🔹 Script started');
    log('🔹 Telegram: ' + (typeof Telegram));
    log('🔹 firebase: ' + (typeof firebase));
    
    if (typeof Telegram !== 'undefined') {
      const tg = Telegram.WebApp;
      tg.expand();
      log('✅ Telegram WebApp initialized');
      log('🔹 User ID: ' + (tg.initDataUnsafe?.user?.id || 'not available'));
    } else {
      log('❌ Telegram SDK failed to load');
    }
    
    if (typeof firebase !== 'undefined') {
      log('✅ Firebase SDK loaded');
    } else {
      log('❌ Firebase SDK failed to load');
    }
    
    const menuBtn = document.querySelector('.menu-btn');
    log('🔹 .menu-btn found: ' + (menuBtn ? 'YES' : 'NO'));
    
    if (menuBtn) {
      const style = getComputedStyle(menuBtn);
      log('🔹 Button background: ' + style.background);
    }
    
    log('🏁 Done');
  </script>
</body>
</html>
