<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .loading { text-align: center; padding: 50px; color: #666; }
    
    /* Стили для кнопки удаления */
    .delete-btn {
      margin-top: 16px;
      width: 100%;
      padding: 12px;
      background: #e53935;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    .delete-btn:hover {
      background: #b71c1c;
    }
    
    /* Модальное окно подтверждения */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.6);
      z-index: 1000;
    }
    .modal {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: var(--tg-theme-bg-color, #fff);
      padding: 24px;
      border-radius: 12px;
      max-width: 320px;
      width: 90%;
      text-align: center;
    }
    .modal h3 {
      margin-top: 0;
      color: #e53935;
    }
    .modal-buttons {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }
    .modal-btn {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
    }
    .modal-btn-cancel {
      background: var(--tg-theme-secondary-bg-color, #f0f0f0);
      color: var(--tg-theme-text-color, #000);
    }
    .modal-btn-confirm {
      background: #e53935;
      color: #fff;
    }
  </style>
</head>
<body>
  <div class="container">
    <div id="loading" class="loading">Загрузка профиля...</div>
    
    <div id="profile-content" style="display: none;">
      <div class="profile-header">
        <h2 id="profile-nickname">Loading...</h2>
        <p>Уровень станции:</p>
        <div class="level-badge" id="profile-level">--</div>
      </div>

      <nav class="main-menu">
        <a href="schedule.html" class="menu-btn">📅 Расписание</a>
        <a href="profile.html" class="menu-btn active">👤 Профиль</a>
        <a href="news.html" class="menu-btn">📰 Новости</a>
        <a href="lion-reminder.html" class="menu-btn">🦁 Лев</a>
        <a href="channels.html" class="menu-btn">📢 Каналы</a>
        <a href="support.html" class="menu-btn">❓ Поддержка</a>
      </nav>
      
      <button id="logout-btn" class="secondary-btn">Выйти</button>
      <button id="delete-account-btn" class="delete-btn">🗑️ Удалить аккаунт</button>
    </div>
  </div>

  <!-- Модальное окно подтверждения -->
  <div id="delete-modal" class="modal-overlay">
    <div class="modal">
      <h3>⚠️ Удаление аккаунта</h3>
      <p>Вы уверены? Все данные будут удалены безвозвратно.</p>
      <div class="modal-buttons">
        <button class="modal-btn modal-btn-cancel" id="cancel-delete">Отмена</button>
        <button class="modal-btn modal-btn-confirm" id="confirm-delete">Удалить</button>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <script src="config.js"></script>
  <script src="js/api.js"></script>
  <script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    window.addEventListener('load', async () => {
      const telegramId = tg.initDataUnsafe?.user?.id;
      
      if (!telegramId) {
        document.getElementById('loading').textContent = '❌ Ошибка: не удалось получить данные Telegram';
        return;
      }
      
      const user = await getUser(telegramId);
      
      if (user) {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('profile-content').style.display = 'block';
        
        document.getElementById('profile-nickname').textContent = user.nickname;
        document.getElementById('profile-level').textContent = user.level;
        
        console.log('✅ Profile loaded for:', user.nickname);
      } else {
        console.log('⚠️ User not found, redirecting to registration');
        window.location.href = 'index.html';
      }
    });

    // Выход (без удаления данных)
    document.getElementById('logout-btn')?.addEventListener('click', () => {
      localStorage.removeItem('tma_user');
      localStorage.removeItem('tma_user_cache');
      window.location.href = 'index.html';
    });

    // Удаление аккаунта
    const deleteBtn = document.getElementById('delete-account-btn');
    const modal = document.getElementById('delete-modal');
    const cancelBtn = document.getElementById('cancel-delete');
    const confirmBtn = document.getElementById('confirm-delete');

    deleteBtn?.addEventListener('click', () => {
      modal.style.display = 'block';
    });

    cancelBtn?.addEventListener('click', () => {
      modal.style.display = 'none';
    });

    confirmBtn?.addEventListener('click', async () => {
      const telegramId = tg.initDataUnsafe?.user?.id;
      
      confirmBtn.textContent = 'Удаление...';
      confirmBtn.disabled = true;
      
      const success = await deleteUser(telegramId);
      
      if (success) {
        // Очищаем кэш
        localStorage.removeItem('tma_user');
        localStorage.removeItem('tma_user_cache');
        
        // Показываем уведомление
        tg.showAlert('✅ Аккаунт успешно удалён!');
        
        // Перенаправляем на регистрацию
        window.location.href = 'index.html';
      } else {
        tg.showAlert('❌ Ошибка при удалении. Попробуйте позже.');
        confirmBtn.textContent = 'Удалить';
        confirmBtn.disabled = false;
        modal.style.display = 'none';
      }
    });

    // Закрытие модального окна при клике вне его
    modal?.addEventListener('click', (e) => {
      if (e.target === modal) {
        modal.style.display = 'none';
      }
    });
  </script>
</body>
</html>
