<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="css/style.css?v=4">
  <style>
    .loading { text-align: center; padding: 50px; color: #666; }
    .delete-btn {
      margin-top: 16px;
      width: 100%;
      padding: 12px;
      background: #e53935;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    .delete-btn:hover { background: #b71c1c; }
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.6);
      z-index: 1000;
    }
    .modal {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      background: var(--tg-theme-bg-color, #fff);
      padding: 24px;
      border-radius: 12px;
      max-width: 320px;
      width: 90%;
      text-align: center;
    }
    .modal h3 { margin-top: 0; color: #e53935; }
    .modal-buttons { display: flex; gap: 10px; margin-top: 20px; }
    .modal-btn {
      flex: 1; padding: 10px; border: none;
      border-radius: 6px; font-weight: 600; cursor: pointer;
    }
    .modal-btn-cancel { background: var(--tg-theme-secondary-bg-color, #f0f0f0); color: var(--tg-theme-text-color, #000); }
    .modal-btn-confirm { background: #e53935; color: #fff; }
  </style>
</head>
<body>
  <div class="container">
    <div id="loading" class="loading">Загрузка профиля...</div>
    
    <div id="profile-content" style="display: none;">
      <div class="profile-header">
        <h2 id="profile-nickname">Loading...</h2>
        <p>Уровень станции:</p>
        <div class="level-badge" id="profile-level">--</div>
      </div>

      <nav class="main-menu">
        <a href="schedule.html" class="menu-btn">📅 Расписание</a>
        <a href="profile.html" class="menu-btn active">👤 Профиль</a>
        <a href="news.html" class="menu-btn">📰 Новости</a>
        <a href="lion-reminder.html" class="menu-btn">🦁 Лев</a>
        <a href="channels.html" class="menu-btn">📢 Каналы</a>
        <a href="support.html" class="menu-btn">❓ Поддержка</a>
      </nav>
      
      <button id="logout-btn" class="secondary-btn">Выйти</button>
      <button id="delete-account-btn" class="delete-btn">🗑️ Удалить аккаунт</button>
    </div>
  </div>

  <!-- Модальное окно -->
  <div id="delete-modal" class="modal-overlay">
    <div class="modal">
      <h3>⚠️ Удаление аккаунта</h3>
      <p>Вы уверены? Все данные будут удалены безвозвратно.</p>
      <div class="modal-buttons">
        <button class="modal-btn modal-btn-cancel" id="cancel-delete">Отмена</button>
        <button class="modal-btn modal-btn-confirm" id="confirm-delete">Удалить</button>
      </div>
    </div>
  </div>

  <!-- 1. SDK Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <!-- 2. Конфиг -->
  <script src="config.js"></script>
  <!-- 3. API -->
  <script src="js/api.js"></script>
  
  <!-- 4. Логика профиля (ВСЁ ВНУТРИ) -->
  <script>
    console.log('🔹 Profile script started');
    const tg = window.Telegram.WebApp;
    tg.expand();

    // === ФУНКЦИЯ УДАЛЕНИЯ ПРЯМО ЗДЕСЬ ===
    async function deleteUserLocal(telegramId) {
      console.log('🗑️ Local deleteUser called for:', telegramId);
      try {
        // Проверяем, инициализирован ли Firebase
        if (typeof firebase === 'undefined' || !firebase.apps.length) {
          console.error('❌ Firebase not initialized');
          return false;
        }
        const db = firebase.firestore();
        await db.collection('users').doc(String(telegramId)).delete();
        console.log('✅ User deleted successfully');
        return true;
      } catch (error) {
        console.error('❌ Delete error:', error);
        return false;
      }
    }
    // ====================================

    window.addEventListener('load', async () => {
      console.log('🔹 Window loaded');

      const telegramId = tg.initDataUnsafe?.user?.id;
      if (!telegramId) {
        document.getElementById('loading').textContent = '❌ Ошибка: нет данных Telegram';
        return;
      }
      
      // Пробуем getUser из api.js, если нет - из localStorage
      let user = null;
      if (typeof window.getUser === 'function') {
        user = await window.getUser(telegramId);
      } else {
        console.warn('⚠️ getUser not found, trying localStorage');
        user = JSON.parse(localStorage.getItem('tma_user'));
      }
      
      if (user) {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('profile-content').style.display = 'block';
        document.getElementById('profile-nickname').textContent = user.nickname;
        document.getElementById('profile-level').textContent = user.level;
        console.log('✅ Profile loaded');

        setupButtons(telegramId);
      } else {
        console.warn('⚠️ User not found, redirecting');
        window.location.href = 'index.html';
      }
    });

    function setupButtons(telegramId) {
      console.log('🔹 Setting up buttons...');

      // Кнопка выхода
      const logoutBtn = document.getElementById('logout-btn');
      if (logoutBtn) {
        logoutBtn.addEventListener('click', () => {
          localStorage.removeItem('tma_user');
          window.location.href = 'index.html';
        });
      }

      // Кнопка удаления
      const deleteBtn = document.getElementById('delete-account-btn');
      const modal = document.getElementById('delete-modal');
      const cancelBtn = document.getElementById('cancel-delete');
      const confirmBtn = document.getElementById('confirm-delete');

      if (!deleteBtn || !modal || !confirmBtn) {
        console.error('❌ Elements not found');
        return;
      }

      deleteBtn.addEventListener('click', () => {
        console.log('🔹 Delete button clicked');
        modal.style.display = 'block';
      });

      cancelBtn.addEventListener('click', () => {
        modal.style.display = 'none';
      });

      // === ИСПРАВЛЕННАЯ КНОПКА УДАЛЕНИЯ ===
      confirmBtn.addEventListener('click', async () => {
        console.log('🔹 Confirm clicked');
        
        // Используем локальную функцию или из api.js
        const deleteFunc = window.deleteUser || deleteUserLocal;
        
        if (typeof deleteFunc !== 'function') {
          tg.showAlert('❌ Ошибка: функция удаления не найдена');
          return;
        }

        confirmBtn.textContent = 'Удаление...';
        confirmBtn.disabled = true;
        
        try {
          const success = await deleteFunc(telegramId);
          console.log('🔹 Delete result:', success);
          
          if (success) {
            localStorage.removeItem('tma_user');
            localStorage.removeItem('tma_user_cache');
            tg.showAlert('✅ Аккаунт удалён!');
            window.location.href = 'index.html';
          } else {
            tg.showAlert('❌ Ошибка при удалении');
            confirmBtn.textContent = 'Удалить';
            confirmBtn.disabled = false;
            modal.style.display = 'none';
          }
        } catch (err) {
          console.error('❌ Exception:', err);
          tg.showAlert('Ошибка: ' + err.message);
          confirmBtn.textContent = 'Удалить';
          confirmBtn.disabled = false;
          modal.style.display = 'none';
        }
      });
    }
  </script>
</body>
</html>
