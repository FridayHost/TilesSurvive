<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Profile</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  
  <!-- ✅ СТИЛИ ВНУТРИ (гарантированно загрузятся) -->
  <style>
    :root {
      --bg-color: var(--tg-theme-bg-color, #ffffff);
      --text-color: var(--tg-theme-text-color, #000000);
      --button-color: var(--tg-theme-button-color, #3390ec);
      --button-text: var(--tg-theme-button-text-color, #ffffff);
      --secondary-bg: var(--tg-theme-secondary-bg-color, #f4f4f5);
      --hint-color: var(--tg-theme-hint-color, #707579);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      font-size: 16px;
      line-height: 1.5;
    }

    .container { max-width: 480px; margin: 0 auto; }

    .loading {
      text-align: center;
      padding: 50px 20px;
      color: var(--hint-color);
      font-size: 14px;
    }

    .profile-header {
      text-align: center;
      padding: 24px 16px;
      border-bottom: 1px solid var(--secondary-bg);
      margin-bottom: 24px;
    }

    .profile-header h2 {
      margin: 0 0 8px 0;
      font-size: 22px;
      font-weight: 600;
    }

    .profile-header p {
      margin: 0;
      font-size: 13px;
      color: var(--hint-color);
    }

    .level-badge {
      display: inline-block;
      margin-top: 10px;
      padding: 6px 18px;
      background-color: var(--button-color);
      color: var(--button-text);
      border-radius: 20px;
      font-size: 15px;
      font-weight: 600;
    }

    .main-menu {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .menu-btn {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px;
      background-color: var(--secondary-bg);
      color: var(--text-color);
      text-decoration: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 500;
      transition: all 0.2s;
    }

    .menu-btn:hover { opacity: 0.9; }

    .menu-btn.active {
      background-color: var(--button-color);
      color: var(--button-text);
    }

    .secondary-btn {
      width: 100%;
      padding: 14px;
      margin-top: 16px;
      background-color: transparent;
      color: var(--button-color);
      border: 1px solid var(--button-color);
      border-radius: 12px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
    }

    .delete-btn {
      width: 100%;
      padding: 14px;
      margin-top: 16px;
      background-color: #e53935;
      color: #ffffff;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }

    .delete-btn:hover { background-color: #b71c1c; }
    .delete-btn:disabled { background-color: #cccccc; cursor: not-allowed; }

    /* Модальное окно */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background-color: rgba(0, 0, 0, 0.6);
      z-index: 1000;
    }

    .modal {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 90%;
      max-width: 320px;
      padding: 24px;
      background-color: var(--bg-color);
      border-radius: 16px;
      text-align: center;
    }

    .modal h3 {
      margin: 0 0 12px 0;
      font-size: 18px;
      font-weight: 600;
      color: #e53935;
    }

    .modal p {
      margin: 0 0 20px 0;
      font-size: 14px;
      color: var(--hint-color);
    }

    .modal-buttons {
      display: flex;
      gap: 10px;
    }

    .modal-btn {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    .modal-btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .modal-btn-cancel {
      background-color: var(--secondary-bg);
      color: var(--text-color);
    }

    .modal-btn-confirm {
      background-color: #e53935;
      color: #ffffff;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="loading" id="loading">Загрузка профиля...</div>

    <div id="profile-content" style="display: none;">
      <div class="profile-header">
        <h2 id="profile-nickname">Loading...</h2>
        <p>Уровень станции:</p>
        <div class="level-badge" id="profile-level">--</div>
      </div>

      <nav class="main-menu">
        <a href="schedule.html" class="menu-btn">📅 Расписание</a>
        <a href="profile.html" class="menu-btn active">👤 Профиль</a>
        <a href="news.html" class="menu-btn">📰 Новости</a>
        <a href="lion-reminder.html" class="menu-btn">🦁 Лев</a>
        <a href="channels.html" class="menu-btn">📢 Каналы</a>
        <a href="support.html" class="menu-btn">❓ Поддержка</a>
        <a href="admin.html" class="menu-btn" id="admin-btn" style="display: none;">🔐 Админка</a>
      </nav>

      <button class="secondary-btn" id="logout-btn">Выйти</button>
      <button class="delete-btn" id="delete-account-btn">🗑️ Удалить аккаунт</button>
    </div>
  </div>

  <div class="modal-overlay" id="delete-modal style="display: none;">
    <div class="modal">
      <h3>⚠️ Удаление аккаунта</h3>
      <p>Вы уверены? Все данные будут удалены безвозвратно.</p>
      <div class="modal-buttons">
        <button type="button" class="modal-btn modal-btn-cancel" id="cancel-delete">Отмена</button>
        <button type="button" class="modal-btn modal-btn-confirm" id="confirm-delete">Удалить</button>
      </div>
    </div>
  </div>

  <!-- 1. Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <!-- 2. Конфиг -->
  <script src="config.js"></script>
  <!-- 3. API -->
  <script src="js/api.js"></script>
  
  <script>
    console.log('🔹 Profile script started');
    const tg = window.Telegram.WebApp;
    tg.expand();

    const ADMIN_IDS = [1182017243, 332240305];

    async function deleteUserLocal(telegramId) {
      try {
        if (typeof firebase === 'undefined' || !firebase.apps.length) {
          return false;
        }
        const db = firebase.firestore();
        await db.collection('users').doc(String(telegramId)).delete();
        return true;
      } catch (error) {
        console.error('❌ Delete error:', error);
        return false;
      }
    }

    window.addEventListener('load', async function() {
      console.log('🔹 Window loaded');
      
      const telegramId = tg.initDataUnsafe?.user?.id;
      
      if (!telegramId) {
        document.getElementById('loading').textContent = '❌ Откройте через Telegram';
        return;
      }

      // ✅ Записываем посещение
  if (typeof window.logVisit === 'function') {
    await window.logVisit(telegramId);
    console.log('✅ Visit logged');
  }

      let user = null;
      
      if (typeof window.getUser === 'function') {
        user = await window.getUser(telegramId);
      }
      
      if (!user) {
        const cached = localStorage.getItem('tma_user');
        if (cached) {
          user = JSON.parse(cached);
        }
      }

      if (user) {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('profile-content').style.display = 'block';
        document.getElementById('profile-nickname').textContent = user.nickname;
        document.getElementById('profile-level').textContent = user.level;
        
        if (ADMIN_IDS.includes(telegramId)) {
          document.getElementById('admin-btn').style.display = 'flex';
        }
        
        setupButtons(telegramId);
      } else {
        window.location.href = 'index.html';
      }
    });

    function setupButtons(telegramId) {
      console.log('🔹 Setting up buttons...');

      const logoutBtn = document.getElementById('logout-btn');
      if (logoutBtn) {
        logoutBtn.addEventListener('click', function() {
          localStorage.removeItem('tma_user');
          window.location.href = 'index.html';
        });
      }

      const deleteBtn = document.getElementById('delete-account-btn');
      const modal = document.getElementById('delete-modal');
      const cancelBtn = document.getElementById('cancel-delete');
      const confirmBtn = document.getElementById('confirm-delete');

      if (!deleteBtn || !modal || !cancelBtn || !confirmBtn) {
        console.error('❌ Modal elements not found');
        return;
      }

      deleteBtn.addEventListener('click', function() {
        console.log('🔹 Open delete modal');
        modal.style.display = 'block';
      });

      cancelBtn.addEventListener('click', function() {
        console.log('🔹 Cancel delete');
        modal.style.display = 'none';
      });

      modal.addEventListener('click', function(e) {
        if (e.target === modal) {
          modal.style.display = 'none';
        }
      });

      confirmBtn.addEventListener('click', async function() {
        console.log('🔹 Confirm delete clicked');
        
        const deleteFunc = window.deleteUser || deleteUserLocal;
        
        if (typeof deleteFunc !== 'function') {
          tg.showAlert('❌ Ошибка: функция удаления не найдена');
          return;
        }

        confirmBtn.textContent = 'Удаление...';
        confirmBtn.disabled = true;

        try {
          const success = await deleteFunc(telegramId);
          
          if (success) {
            localStorage.removeItem('tma_user');
            tg.showAlert('✅ Аккаунт удалён!');
            window.location.href = 'index.html';
          } else {
            tg.showAlert('❌ Ошибка при удалении');
            confirmBtn.textContent = 'Удалить';
            confirmBtn.disabled = false;
            modal.style.display = 'none';
          }
        } catch (err) {
          tg.showAlert('Ошибка: ' + err.message);
          confirmBtn.textContent = 'Удалить';
          confirmBtn.disabled = false;
          modal.style.display = 'none';
        }
      });
    }
  </script>
</body>
</html>
